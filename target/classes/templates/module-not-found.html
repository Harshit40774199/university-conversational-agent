<!DOCTYPE html>
<html>
<head>
    <title>Module Not Found</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }

        .box {
            max-width: 700px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 12px;
        }

        p {
            color: #475569;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            padding: 10px 16px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Module not found</h1>
        <p>The module page you requested does not exist.</p>
        <a href="/">Go back to home</a>
    </div>
</body>
</html>
